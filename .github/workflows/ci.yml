name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  files-changed:
    uses: ./.github/workflows/files-changed.yml

  lint:
    if: needs.files-changed.outputs.lint == 'true' || needs.files-changed.outputs.actions == 'true'
    needs: files-changed
    runs-on: macos-latest
    steps:
    - name: Checkout
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # was: actions/checkout@v7.0.0
      with:
        fetch-depth: 0
    - name: Set up Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # was: actions/setup-go@v6
      with:
        go-version-file: go.mod
        check-latest: true
    - name: Setup golangci-lint
      uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # was: golangci/golangci-lint-action@v9
      with:
        version: latest
        skip-cache: true
        args: --timeout=10m --verbose
  test:
    if: needs.files-changed.outputs.app == 'true' || needs.files-changed.outputs.actions == 'true'
    needs: files-changed
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # was: actions/checkout@v7.0.0
      with:
        fetch-depth: 0
    - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # was: actions/setup-go@v6
      with:
        go-version-file: go.mod
        check-latest: true
    - name: Test
      run: make test
  build:
    if: needs.files-changed.outputs.app == 'true' || needs.files-changed.outputs.actions == 'true'
    needs: files-changed
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # was: actions/checkout@v7.0.0
      with:
        fetch-depth: 0
    - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # was: actions/setup-go@v6
      with:
        go-version-file: go.mod
        check-latest: true
    - name: Build
      run: make build
