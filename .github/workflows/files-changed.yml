name: files-changed

on:
  workflow_call:
    outputs:
      app:
        value: ${{ jobs.detect.outputs.app }}
      actions:
        value: ${{ jobs.detect.outputs.actions }}
      lint:
        value: ${{ jobs.detect.outputs.lint }}
      docs:
        value: ${{ jobs.detect.outputs.docs }}

jobs:
  detect:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    outputs:
      app: ${{ steps.changes.outputs.app }}
      actions: ${{ steps.changes.outputs.actions }}
      lint: ${{ steps.changes.outputs.lint }}
      docs: ${{ steps.changes.outputs.docs }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # was: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # was: dorny/paths-filter@v4
        id: changes
        with:
          filters: |

            app:
              - "**/*.go"
              - "go.mod"
              - "go.sum"
              - "Makefile"

            actions:
              - added|modified:
                - ".github/workflows/*"
                - "Makefile"

            lint:
              - added|modified:
                - "**/*.go"
                - ".golangci.yml"

            docs:
              - "**/*.md"
